name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install renderer test dependencies
        run: python -m pip install -r plugins/eba-protokoll/scripts/requirements.txt
      - name: Validate Codex plugin manifests
        run: python scripts/validate_codex_plugin.py plugins/eba-protokoll
      - name: Validate reference contract
        run: node plugins/eba-protokoll/scripts/validate-references.mjs
      - name: Smoke-test QMG renderer
        run: python plugins/eba-protokoll/scripts/smoke_render.py
